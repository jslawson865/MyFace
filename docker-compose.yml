services:
  mysql:
    image: mysql:8.4
    container_name: myface-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: myface
      MYSQL_USER: myface
      MYSQL_PASSWORD: myface
      MYSQL_ROOT_PASSWORD: myface-root
    ports:
      - "3306:3306"
    volumes:
      - myface_mysql:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: myface-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  myface_mysql:
