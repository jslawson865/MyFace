name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      # Temporary baseline behavior: no pnpm-lock.yaml exists yet.
      # After the first successful local install, commit pnpm-lock.yaml and switch this back to --frozen-lockfile.
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
